        :root {
            --sky: #CBDDE9;
            --ocean: #2872A1;
            --ocean-dark: #1a5580;
            --ocean-light: #3a8bbf;
            --white: #ffffff;
            --sky-dark: #a8c4d6;
            --text-dark: #0e3a54;
            --text-mid: #2c5f7a;
            --text-muted: #5b8ca6;
            --card-bg: rgba(255,255,255,0.92);
            --shadow: rgba(40,114,161,0.15);
            --shadow-hover: rgba(40,114,161,0.30);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hicheta', 'Josefin Sans', 'Segoe UI', sans-serif;
            background: linear-gradient(160deg, #CBDDE9 0%, #88b8d4 40%, #2872A1 100%);
            min-height: 100vh;
            color: var(--text-dark);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 50px 20px 30px;
            position: relative;
        }

        .header::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: var(--white);
            margin: 18px auto 0;
            border-radius: 2px;
            opacity: 0.7;
        }

        .header h1 {
            font-family: 'Hicheta', 'Josefin Sans', sans-serif;
            font-size: 3.4rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 20px rgba(14,58,84,0.25);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.05rem;
            color: rgba(255,255,255,0.88);
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* ── STATS ── */
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.35);
            padding: 16px 30px;
            border-radius: 14px;
            text-align: center;
            color: var(--white);
            min-width: 130px;
        }

        .stat-number {
            font-family: 'Hicheta', 'Josefin Sans', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .stat-label {
            font-size: 0.78rem;
            opacity: 0.82;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* ── FILTERS ── */
        .filters {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            padding: 28px 32px;
            margin-bottom: 36px;
            border: 1px solid rgba(255,255,255,0.35);
        }

        .filter-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            color: var(--white);
            font-weight: 600;
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        select, input {
            padding: 11px 16px;
            border: 1.5px solid rgba(255,255,255,0.45);
            border-radius: 10px;
            background: rgba(255,255,255,0.88);
            font-family: 'Hicheta', 'Josefin Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            min-width: 200px;
            transition: all 0.25s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--ocean);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(40,114,161,0.18);
            transform: translateY(-1px);
        }

        input::placeholder {
            color: var(--text-muted);
            opacity: 0.8;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
        }

        /* ── TOOLS GRID ── */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 22px;
            margin-top: 10px;
        }

        /* ── TOOL CARD ── */
        .tool-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 24px 26px;
            box-shadow: 0 6px 24px var(--shadow);
            transition: transform 0.28s ease, box-shadow 0.28s ease;
            border: 1px solid rgba(203,221,233,0.6);
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--sky), var(--ocean), var(--sky-dark));
        }

        .tool-card:hover {
            transform: translateY(-7px);
            box-shadow: 0 16px 36px var(--shadow-hover);
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 10px;
        }

        .tool-name {
            font-family: 'Hicheta', 'Josefin Sans', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 1px;
        }

        .tool-category {
            background: linear-gradient(135deg, var(--ocean), var(--ocean-dark));
            color: var(--white);
            padding: 5px 13px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tool-description {
            color: var(--text-mid);
            line-height: 1.65;
            font-size: 0.93rem;
            margin-bottom: 18px;
        }

        .tool-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pricing-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.5px;
        }

        .pricing-free {
            background: #dff2eb;
            color: #155724;
        }

        .pricing-paid {
            background: #fde8e8;
            color: #7a1c1c;
        }

        .pricing-freemium {
            background: #e8f4fb;
            color: var(--ocean-dark);
        }

        /* fallback for non-standard pricing strings */
        .pricing-badge:not(.pricing-free):not(.pricing-paid):not(.pricing-freemium) {
            background: var(--sky);
            color: var(--ocean-dark);
        }

        .tool-link {
            background: linear-gradient(135deg, var(--ocean), var(--ocean-dark));
            color: var(--white);
            padding: 9px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.5px;
            transition: all 0.25s ease;
        }

        .tool-link:hover {
            background: linear-gradient(135deg, var(--ocean-light), var(--ocean));
            transform: scale(1.04);
            box-shadow: 0 4px 14px rgba(40,114,161,0.35);
        }

        /* ── NO RESULTS ── */
        .no-results {
            text-align: center;
            color: var(--white);
            font-size: 1.1rem;
            margin-top: 50px;
            padding: 40px;
            background: rgba(255,255,255,0.12);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ── FOOTER CREDIT ── */
        .footer-credit {
            text-align: center;
            padding: 30px 0 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            letter-spacing: 1px;

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }

            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }

            select, input {
                min-width: unset;
                width: 100%;
            }

            .tools-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

            { name: "Genspark", category: "AI Search & Research", description: "AI-powered research engine that generates comprehensive, structured 'Sparkpages' — synthesized deep dives on any topic with source citations.", pricing: "free", url: "https://www.genspark.ai" },
            { name: "Replit Agent", category: "AI App Builder", description: "Replit's agentic AI mode that builds full-stack apps from descriptions with built-in database, auth, hosting, and 30+ integrations like Stripe and Figma.", pricing: "freemium", url: "https://replit.com" },
            { name: "Microsoft Copilot Studio", category: "AI Agent Builder", description: "Low-code platform for building custom AI agents and copilots on top of Azure OpenAI and Microsoft 365 data — no deep ML expertise required.", pricing: "freemium", url: "https://copilotstudio.microsoft.com" },
            { name: "Ideogram", category: "AI Image Generation", description: "AI image generator known for accurate text rendering inside images — ideal for creating logos, posters, and typographic designs from prompts.", pricing: "freemium", url: "https://ideogram.ai" },
            { name: "Kling AI", category: "AI Video Generation", description: "Chinese AI video generation model by Kuaishou capable of producing high-quality, physics-accurate video clips from text or image prompts.", pricing: "freemium", url: "https://klingai.com" },
            { name: "Hailuo AI", category: "AI Video Generation", description: "MiniMax's AI video generation platform producing smooth, cinematic short clips from text prompts with strong motion consistency.", pricing: "freemium", url: "https://hailuoai.com" },
            { name: "Hedra", category: "AI Video Generation", description: "AI tool for creating talking-head videos from a single image and audio clip — widely used for AI avatars and character animation.", pricing: "freemium", url: "https://www.hedra.com" },
            { name: "Napkin AI", category: "AI Diagram Tool", description: "Turns written text or notes into visual diagrams, flowcharts, and infographics automatically — no design skills needed.", pricing: "freemium", url: "https://www.napkin.ai" },
            { name: "Gemini Deep Research", category: "AI Research Tool", description: "Gemini's agentic research mode that autonomously browses the web, reads sources, and compiles comprehensive multi-page research reports on any topic.", pricing: "freemium", url: "https://gemini.google.com" },
            
        ];

        let filteredTools = [...aiTools];

        const categoryFilter = document.getElementById('categoryFilter');
        const pricingFilter = document.getElementById('pricingFilter');
        const searchInput = document.getElementById('searchInput');
        const toolsGrid = document.getElementById('toolsGrid');
        const noResults = document.getElementById('noResults');
        const totalToolsEl = document.getElementById('totalTools');
        const freeToolsEl = document.getElementById('freeTools');
        const categoriesEl = document.getElementById('categories');

        function getPricingClass(pricing) {
            if (!pricing) return '';
            const p = pricing.toLowerCase();
            if (p === 'free') return 'pricing-free';
            if (p === 'paid') return 'pricing-paid';
            if (p === 'freemium') return 'pricing-freemium';
            return '';
        }

        function getPricingLabel(pricing) {
            if (!pricing) return '';
            const p = pricing.toLowerCase();
            if (p === 'free') return 'Free';
            if (p === 'paid') return 'Paid';
            if (p === 'freemium') return 'Freemium';
            return pricing.charAt(0).toUpperCase() + pricing.slice(1);
        }

        function init() {
            populateCategories();
            updateStats();
            renderTools();
            setupEventListeners();
        }

        function populateCategories() {
            const categories = [...new Set(aiTools.map(tool => tool.category))].sort();
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilter.appendChild(option);
            });
        }

        function updateStats() {
            const freeToolsCount = aiTools.filter(tool => tool.pricing === 'free').length;
            const categoriesCount = new Set(aiTools.map(tool => tool.category)).size;
            totalToolsEl.textContent = aiTools.length;
            freeToolsEl.textContent = freeToolsCount;
            categoriesEl.textContent = categoriesCount;
        }

        function renderTools() {
            if (filteredTools.length === 0) {
                toolsGrid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            toolsGrid.style.display = 'grid';
            noResults.style.display = 'none';
            toolsGrid.innerHTML = filteredTools.map(tool => `
                <div class="tool-card">
                    <div class="tool-header">
                        <div>
                            <h3 class="tool-name">${tool.name}</h3>
                        </div>
                        <span class="tool-category">${tool.category}</span>
                    </div>
                    <p class="tool-description">${tool.description}</p>
                    <div class="tool-footer">
                        <span class="pricing-badge ${getPricingClass(tool.pricing)}">
                            ${getPricingLabel(tool.pricing)}
                        </span>
                        <a href="${tool.url}" target="_blank" class="tool-link">Visit Tool</a>
                    </div>
                </div>
            `).join('');
        }

        function filterTools() {
            const selectedCategory = categoryFilter.value;
            const selectedPricing = pricingFilter.value;
            const searchTerm = searchInput.value.toLowerCase();
            filteredTools = aiTools.filter(tool => {
                const matchesCategory = !selectedCategory || tool.category === selectedCategory;
                const matchesPricing = !selectedPricing || tool.pricing === selectedPricing;
                const matchesSearch = !searchTerm ||
                    tool.name.toLowerCase().includes(searchTerm) ||
                    tool.description.toLowerCase().includes(searchTerm) ||
                    tool.category.toLowerCase().includes(searchTerm);
                return matchesCategory && matchesPricing && matchesSearch;
            });
            renderTools();
        }

        function setupEventListeners() {
            categoryFilter.addEventListener('change', filterTools);
            pricingFilter.addEventListener('change', filterTools);
            searchInput.addEventListener('input', filterTools);
        }

        init();
    </script>
</body>
</html>
